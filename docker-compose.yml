services:
  
  database:
    image: mysql_application:latest
    container_name: mysql_container
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: pwd123
      MYSQL_DATABASE: demo_db
    
    networks:
      - my_app_network
    
    ports:
      - 3307:3306
    
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 10s

  backend:
    image: backend_application:latest
    container_name: backend_container
    restart: always

    environment:
      DB_HOST: database
      DB_NAME: demo_db
      DB_USER: root
      DB_PASSWORD: pwd123
    
    ports:
      - 9093:4000

    networks:
      - my_app_network

    depends_on:
      database:
        condition: service_healthy
  
  frontend:
    image: frontend_application:latest
    container_name: frontend_container
    restart: always

    ports:
      - 9094:80
    
    networks:
      - my_app_network
    
    depends_on:
      backend: 
        condition: service_started

networks:
  my_app_network: